# schema
[settings]
experimental = true
env_shell_expand = true

[tools]
actionlint = "latest"
cargo-binstall = "latest"
"github:KevinGimbel/mktoc" = "latest"
"github:RobertDeRose/nixfmt" = "latest"
"github:joshrotenberg/mdbook-lint" = "latest"
hk = "1.41"
mdbook = "latest"
"npm:markdown-table-formatter" = "latest"
pkl = "latest"
rumdl = "latest"
shellcheck = "latest"
shfmt = "latest"
tombi = "latest"
typos = "latest"

[env]
HK_MISE = 1

[hooks]
postinstall = "hk install --mise"

# ── Tasks ──────────────────────────────────────────────────────────────────────

[tasks.check]
description = "Verify flake evaluates cleanly (nix flake check)"
run = "nix flake check"

[tasks."build:squashfs"]
description = "Build squashfs rootfs (nix build .#squashfs -o result-squashfs)"
run = "nix build .#squashfs -o result-squashfs"

[tasks."build:rauc-bundle"]
description = "Build signed RAUC bundle (nix build .#rauc-bundle -o result-rauc-bundle)"
run = "nix build .#rauc-bundle -o result-rauc-bundle"

[tasks."build:boot-script"]
description = "Build U-Boot boot script (nix build .#boot-script -o result-boot-script)"
run = "nix build .#boot-script -o result-boot-script"

[tasks."build:image"]
description = "Build flashable disk image (nix build .#image -o result-image)"
run = "nix build .#image -o result-image"

[tasks.build]
description = "Build all image artifacts"
depends = ["build:*"]

[tasks.e2e]
description = "Run all E2E integration tests"
depends = [
  "e2e:rauc-slots",
  "e2e:rauc-update",
  "e2e:rauc-rollback",
  "e2e:rauc-confirm",
  "e2e:rauc-power-loss",
  "e2e:rauc-watchdog",
  "e2e:firewall",
  "e2e:network-isolation",
  "e2e:ssh-wan-toggle",
]
