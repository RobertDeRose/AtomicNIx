# schema
[settings]
experimental = true
env_shell_expand = true

[tools]
actionlint = "latest"
cargo-binstall = "latest"
"github:KevinGimbel/mktoc" = "latest"
"github:RobertDeRose/nixfmt" = "latest"
"github:joshrotenberg/mdbook-lint" = "latest"
hk = "1.41"
mdbook = "latest"
"npm:markdown-table-formatter" = "latest"
pkl = "latest"
rumdl = "latest"
shellcheck = "latest"
shfmt = "latest"
tombi = "latest"
typos = "latest"

[env]
HK_MISE = 1
_.file = ".env"

[hooks]
postinstall = "hk install --mise"

# ── Tasks ──────────────────────────────────────────────────────────────────────

[tasks.check]
description = "Verify flake evaluates cleanly (nix flake check)"
run = "nix flake check"

[tasks._lima]
description = "Ensure Lima VM is running (hidden helper)"
hide = true
usage = 'arg "<vm>" help="Lima VM instance name" default="default"'
run = """
#!/usr/bin/env bash
set -euo pipefail
if ! command -v limactl &>/dev/null; then
  echo "ERROR: limactl not found. Install Lima: https://lima-vm.io/"
  exit 1
fi
limactl start "${usage_vm}" 2>/dev/null || true
"""

[tasks."build:squashfs"]
description = "Build squashfs rootfs"
usage = """
flag "--lima" help="Build inside a Lima VM"
flag "--vm <name>" help="Lima VM instance name" default="default"
"""
run = """
#!/usr/bin/env bash
set -euo pipefail
cmd=()
if [ "${usage_lima:-false}" = "true" ]; then
  mise run _lima "${usage_vm}"
  cmd+=(limactl shell "${usage_vm}" --)
fi
"${cmd[@]}" nix build .#squashfs -o result-squashfs
"""

[tasks."build:rauc-bundle"]
description = "Build signed RAUC bundle"
usage = """
flag "--lima" help="Build inside a Lima VM"
flag "--vm <name>" help="Lima VM instance name" default="default"
"""
run = """
#!/usr/bin/env bash
set -euo pipefail
cmd=()
if [ "${usage_lima:-false}" = "true" ]; then
  mise run _lima "${usage_vm}"
  cmd+=(limactl shell "${usage_vm}" --)
fi
"${cmd[@]}" nix build .#rauc-bundle -o result-rauc-bundle
"""

[tasks."build:boot-script"]
description = "Build U-Boot boot script"
usage = """
flag "--lima" help="Build inside a Lima VM"
flag "--vm <name>" help="Lima VM instance name" default="default"
"""
run = """
#!/usr/bin/env bash
set -euo pipefail
cmd=()
if [ "${usage_lima:-false}" = "true" ]; then
  mise run _lima "${usage_vm}"
  cmd+=(limactl shell "${usage_vm}" --)
fi
"${cmd[@]}" nix build .#boot-script -o result-boot-script
"""

[tasks.build]
description = "Build all artifacts and copy flashable image to cwd"
usage = """
flag "--lima" help="Build inside a Lima VM"
flag "--vm <name>" help="Lima VM instance name" default="default"
flag "-o --output <path>" help="Copy .img to this path (default: cwd)"
"""
run = """
#!/usr/bin/env bash
set -euo pipefail
cmd=()
if [ "${usage_lima:-false}" = "true" ]; then
  mise run _lima "${usage_vm}"
  cmd+=(limactl shell "${usage_vm}" --)
fi

OUT=$("${cmd[@]}" nix build .#squashfs .#rauc-bundle .#boot-script .#image --no-link --print-out-paths)
IMG=$("${cmd[@]}" find $OUT -name '*.img' -print -quit)
DEST="${usage_output:-$(basename "$IMG")}"
"${cmd[@]}" cp "$IMG" "$PWD/$DEST"
chmod u+w "$PWD/$DEST"
SIZE=$(stat -c%s "$DEST" 2>/dev/null || stat -f%z "$DEST")
echo ""
echo "Image: $DEST ($((SIZE / 1024 / 1024)) MiB)"
"""

[tasks."admin:pass"]
description = "Write a local development admin password hash to .local/admin-password-hash"
interactive = true
run = """
#!/usr/bin/env bash
set -euo pipefail

upsert_env_var() {
  local key="$1"
  local value="$2"

  touch .env
  if grep -q "^${key}=" .env 2>/dev/null; then
    perl -0pi -e 's/^'"${key}"'=.*$/'"${key}"'='"${value}"'/m' .env
  else
    printf '%s=%s\n' "$key" "$value" >> .env
  fi
}

read -rsp "Development admin password: " PASSWORD
echo
read -rsp "Confirm password: " PASSWORD_CONFIRM
echo

if [ -z "$PASSWORD" ]; then
  echo "ERROR: Password cannot be empty" >&2
  exit 1
fi

if [ "$PASSWORD" != "$PASSWORD_CONFIRM" ]; then
  echo "ERROR: Passwords did not match" >&2
  exit 1
fi

mkdir -p .local
HASH=$(openssl passwd -6 "$PASSWORD")
printf '%s\n' "$HASH" > .local/admin-password-hash
chmod 600 .local/admin-password-hash

upsert_env_var DEVELOPMENT 1
upsert_env_var ADMIN_PASSWORD_HASH_FILE .local/admin-password-hash

echo "Wrote development password hash to .local/admin-password-hash"
echo "Updated .env with DEVELOPMENT=1 and ADMIN_PASSWORD_HASH_FILE=.local/admin-password-hash"
"""

[tasks.e2e]
description = "Run all E2E integration tests"
usage = """
flag "--lima" help="Run E2E tasks inside a Lima VM"
flag "--vm <name>" help="Lima VM instance name" default="default"
"""
run = """
#!/usr/bin/env bash
set -euo pipefail

args=()
if [ "${usage_lima:-false}" = "true" ]; then
  args+=(--lima)
  args+=(--vm "${usage_vm}")
fi

mise run e2e:rauc-slots "${args[@]}"
mise run e2e:rauc-update "${args[@]}"
mise run e2e:rauc-rollback "${args[@]}"
mise run e2e:rauc-confirm "${args[@]}"
mise run e2e:rauc-power-loss "${args[@]}"
mise run e2e:rauc-watchdog "${args[@]}"
mise run e2e:firewall "${args[@]}"
mise run e2e:network-isolation "${args[@]}"
mise run e2e:ssh-wan-toggle "${args[@]}"
"""
