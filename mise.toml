# schema
[settings]
experimental = true
env_shell_expand = true

[tools]
actionlint = "latest"
"github:RobertDeRose/nixfmt" = "latest"
hk = "1.41"
pkl = "latest"
shellcheck = "latest"
shfmt = "latest"
tombi = "latest"

[env]
HK_MISE = 1

[hooks]
postinstall = "hk install --mise"

# ── Tasks ──────────────────────────────────────────────────────────────────────

[tasks.check]
description = "Verify flake evaluates cleanly"
run = "nix flake check"

[tasks."build:squashfs"]
description = "Build the squashfs root filesystem image"
run = "nix build .#squashfs -o result-squashfs"

[tasks."build:rauc-bundle"]
description = "Build the signed RAUC bundle (boot + rootfs)"
run = "nix build .#rauc-bundle -o result-rauc-bundle"

[tasks."build:boot-script"]
description = "Build the U-Boot boot script"
run = "nix build .#boot-script -o result-boot-script"

[tasks."build:image"]
description = "Build the flashable eMMC disk image"
run = "nix build .#image -o result-image"

[tasks.build]
description = "Build all image artifacts"
depends = ["build:*"]
